<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Stock</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <div class="topbar">
        <div class="lang-switch" id="lang-switch">
          <button data-lang="zh">中文</button>
          <button data-lang="en">EN</button>
        </div>
      </div>
      <h1 id="home-title">Easy Stock</h1>
      <div id="disclaimer-banner" class="disclaimer" role="note">
        所有内容由 AI 生成，仅用于学习，不构成任何投资建议。
      </div>
      <div id="pnl-summary" class="summary-bar"></div>
      <div class="toolbar">
        <label id="market-filter-label" for="market-filter">市场过滤</label>
        <select id="market-filter">
          <option value="all">全部</option>
          <option value="us">美股</option>
          <option value="au">澳股</option>
          <option value="other">其他地区</option>
        </select>
        <label id="keyword-filter-label" for="keyword-filter">关键词</label>
        <input id="keyword-filter" type="text" placeholder="输入代码或日期" />
      </div>
    </header>
    <section id="report-list" class="grid"></section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
